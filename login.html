<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión | SmartTrip Colombia</title>
    <!-- Tailwind CDN (Warning in console is normal for dev) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
        rel="stylesheet" />
    <!-- FontAwesome CDN (Standard, no CORS/403 issues) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1773cf",
                        "accent": "#00ced1",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .bg-login {
            background-image: url('https://images.unsplash.com/photo-1583531352515-88841314dd95?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            backdrop-filter: blur(2px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-panel {
            background: rgba(17, 25, 33, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
    <div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
        <!-- Background Layer -->
        <div class="absolute inset-0 z-0">
            <div
                class="absolute inset-0 bg-primary/30 backdrop-blur-[1px] z-10 text-white flex items-center justify-center pointer-events-none opacity-0 hover:opacity-100 transition-opacity">
                <!-- Overlay content if needed -->
            </div>
            <div class="w-full h-full bg-login bg-cover bg-center"></div>
        </div>

        <div class="relative z-20 w-full max-w-md p-6">
            <div
                class="glass-panel rounded-2xl shadow-2xl p-8 md:p-10 transition-all duration-300 hover:shadow-primary/10">
                <div class="flex flex-col items-center mb-8">
                    <div
                        class="bg-primary p-3 rounded-2xl mb-4 text-white shadow-lg shadow-primary/30 transform transition-transform hover:scale-105">
                        <span class="material-symbols-outlined text-4xl">travel_explore</span>
                    </div>
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 tracking-tight text-center">
                        SmartTrip Colombia</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 text-center">Ingresa para gestionar tu
                        próxima gran aventura</p>
                </div>

                <form class="space-y-6" id="loginForm">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2" for="email">
                            Correo Electrónico
                        </label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
                            <input
                                class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-xl focus:ring-0 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100"
                                id="email" placeholder="viajero@ejemplo.com" type="email" required />
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300" for="password">
                                Contraseña
                            </label>
                            <a class="text-xs font-bold text-primary hover:text-accent transition-colors"
                                href="#">Recuperar clave</a>
                        </div>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
                            <input
                                class="w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-xl focus:ring-0 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100"
                                id="password" placeholder="••••••••" type="password" required />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-colors"
                                type="button" onclick="togglePassword()">
                                <span class="material-symbols-outlined text-xl" id="passIcon">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary"
                                id="remember" type="checkbox" />
                            <span class="text-sm text-slate-600 dark:text-slate-400">Recordar sesión</span>
                        </label>
                    </div>

                    <button
                        class="w-full bg-primary hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2"
                        type="submit" id="submitBtn">
                        <span id="btnText">Entrar al Panel</span>
                        <span class="material-symbols-outlined" id="btnIcon">arrow_forward</span>
                    </button>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div
                        class="relative flex justify-center text-xs uppercase font-bold tracking-widest text-slate-500">
                        <span class="bg-white dark:bg-slate-900 px-4">Plataformas</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-slate-700 dark:text-slate-300 hover:border-slate-200">
                        <i class="fab fa-google text-red-500"></i>
                        <span>Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-slate-700 dark:text-slate-300 hover:border-slate-200">
                        <i class="fab fa-facebook text-blue-600"></i>
                        <span>Facebook</span>
                    </button>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-sm text-slate-600 dark:text-slate-400 font-medium">
                        ¿Primera vez aquí?
                        <a class="font-bold text-primary hover:underline underline-offset-4 ml-1" href="quote.html">Crea
                            tu cuenta</a>
                    </p>
                </div>
            </div>

            <footer class="mt-8 text-center text-white/90 text-[10px] uppercase font-bold tracking-widest">
                <p>&copy; 2026 SmartTrip Colombia &bull; Todos los derechos reservados</p>
                <div class="mt-3 flex justify-center gap-6">
                    <a class="hover:text-white transition-colors" href="#">Términos</a>
                    <a class="hover:text-white transition-colors" href="#">Privacidad</a>
                    <a class="hover:text-white transition-colors" href="#">Seguridad</a>
                </div>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="crm-service.js?v=debugV7"></script>
    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            try {
                submitBtn.disabled = true;
                btnText.innerText = 'Validando Acceso...';
                btnIcon.innerText = 'sync';
                btnIcon.classList.add('animate-spin');

                console.log("DEBUG: Iniciando login para:", email);
                const response = await window.CRM.loginUser(email, password);
                console.log("DEBUG: Respuesta de CRM:", response);

                if (response.token) {
                    console.log("DEBUG: Token obtenido. Guardando y redirigiendo...");
                    // Aseguramos que el token se guarde antes de redirigir
                    localStorage.setItem('crm_auth_token', response.token);
                    window.location.href = 'dashboard.html';
                } else {
                    console.error("DEBUG: Respuesta sin token:", response);
                    alert('Error: No se recibió un token de acceso válido.');
                }
            } catch (error) {
                console.error("DEBUG: Login Fallido:", error);
                alert('No pudimos iniciar sesión. ' + (error.message || 'Error de conexión.'));
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = 'Entrar al Panel';
                btnIcon.innerText = 'arrow_forward';
                btnIcon.classList.remove('animate-spin');
            }
        });
    </script>
</body>

</html>
